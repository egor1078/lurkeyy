services:
  - type: web
    name: lurk-key-system
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: HMAC_SECRET
        generateValue: true
      - key: TURNSTILE_SECRET
        sync: false
      - key: LINKVERTISE_ID
        sync: false
      - key: BASE_URL
        sync: false
      - key: KEY_TTL_HOURS
        value: "24"
      - key: MIN_LINKVERTISE_SECONDS
        value: "15"
      - key: RATE_LIMIT_SESSION
        value: "5"
      - key: RATE_LIMIT_CHECK
        value: "30"
      - key: PORT
        value: "3000"
      - key: RUST_LOG
        value: "info"
